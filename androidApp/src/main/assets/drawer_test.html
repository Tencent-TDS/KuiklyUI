<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drawer Touch Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    display: flex;
    background: #f5f5f5;
  }

  .sidebar {
    width: 140px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    padding: 14px 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    text-align: center;
  }
  .sidebar-btn:active {
    transform: scale(0.95);
    opacity: 0.8;
  }
  .btn-red    { background: #f44336; }
  .btn-blue   { background: #2196f3; }
  .btn-green  { background: #4caf50; }
  .btn-orange { background: #ff9800; }
  .btn-purple { background: #9c27b0; }
  .btn-teal   { background: #009688; }
  .btn-pink   { background: #e91e63; }
  .btn-reset  { background: #607d8b; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background-color 0.3s;
  }
  .content h2 {
    font-size: 22px;
    margin-bottom: 8px;
    color: #333;
  }
  .content .msg {
    font-size: 16px;
    color: #666;
    margin-bottom: 16px;
    text-align: center;
  }
  .counter-box {
    background: rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 16px 28px;
    text-align: center;
  }
  .counter-box .label {
    font-size: 13px;
    color: #999;
    margin-bottom: 4px;
  }
  .counter-box .num {
    font-size: 36px;
    font-weight: 700;
    color: #333;
  }
  .emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="sidebar">
  <button class="sidebar-btn btn-red"    onclick="onBtn('Red',    '#ffebee', '1')">Red</button>
  <button class="sidebar-btn btn-blue"   onclick="onBtn('Blue',   '#e3f2fd', '2')">Blue</button>
  <button class="sidebar-btn btn-green"  onclick="onBtn('Green',  '#e8f5e9', '3')">Green</button>
  <button class="sidebar-btn btn-orange" onclick="onBtn('Orange', '#fff3e0', '4')">Orange</button>
  <button class="sidebar-btn btn-purple" onclick="onBtn('Purple', '#f3e5f5', '5')">Purple</button>
  <button class="sidebar-btn btn-teal"   onclick="onBtn('Teal',   '#e0f2f1', '6')">Teal</button>
  <button class="sidebar-btn btn-pink"   onclick="onBtn('Pink',   '#fce4ec', '7')">Pink</button>
  <button class="sidebar-btn btn-reset"  onclick="onReset()">Reset</button>
</div>

<div class="content" id="contentArea">
  <div class="emoji" id="emoji">&#x1F44B;</div>
  <h2 id="title">Tap a button</h2>
  <p class="msg" id="msg">Click a color button on the left to change this page</p>
  <div class="counter-box">
    <div class="label">Total Clicks</div>
    <div class="num" id="counter">0</div>
  </div>
</div>

<script>
  var count = 0;
  var emojis = {
    '1': '&#x2764;&#xFE0F;',
    '2': '&#x1F499;',
    '3': '&#x1F49A;',
    '4': '&#x1F9E1;',
    '5': '&#x1F49C;',
    '6': '&#x1F49A;',
    '7': '&#x1F497;'
  };

  function onBtn(name, bgColor, id) {
    count++;
    document.getElementById('contentArea').style.backgroundColor = bgColor;
    document.getElementById('title').textContent = name + ' selected!';
    document.getElementById('msg').textContent = 'You picked ' + name + ' (click #' + count + ')';
    document.getElementById('counter').textContent = count;
    document.getElementById('emoji').innerHTML = emojis[id] || '&#x1F3A8;';
  }

  function onReset() {
    count = 0;
    document.getElementById('contentArea').style.backgroundColor = '#f5f5f5';
    document.getElementById('title').textContent = 'Tap a button';
    document.getElementById('msg').textContent = 'Click a color button on the left to change this page';
    document.getElementById('counter').textContent = '0';
    document.getElementById('emoji').innerHTML = '&#x1F44B;';
  }
</script>

</body>
</html>
